<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medical Cost Prediction</title>

  <!-- Google Fonts & Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Materialize CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">

  <!-- ✨ Custom CSS -->
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ede7f6, #e3f2fd);
      min-height: 100vh;
      color: #333;
    }

    /* Navbar */
    nav.purple.darken-4 {
      background: linear-gradient(90deg, #5e35b1, #8e24aa);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }

    .brand-logo {
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .nav-wrapper ul li a {
      font-weight: 500;
      transition: all 0.3s;
    }

    .nav-wrapper ul li a:hover {
      background-color: transparent !important;
      color: #ffeb3b;
    }

    /* Hero Section */
    .section {
      padding: 60px 20px;
    }

    .header-text {
      font-size: 2.8rem;
      font-weight: 700;
      color: #4a148c;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .sub-header {
      font-size: 1.2rem;
      color: #555;
      margin-bottom: 2rem;
    }

    /* Form Card */
    .card {
      padding: 35px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    label {
      color: #6a1b9a !important;
      font-weight: 500;
    }

    input, input::placeholder {
      color: #333 !important;
    }

    input:focus {
      border-bottom: 2px solid #8e24aa !important;
      box-shadow: 0 1px 0 0 #8e24aa !important;
    }

    .btn-custom {
      background: linear-gradient(90deg, #6a1b9a, #ab47bc);
      transition: all 0.3s ease;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(171, 71, 188, 0.4);
      font-weight: 600;
    }

    .btn-custom:hover {
      transform: scale(1.07);
      box-shadow: 0 8px 22px rgba(171, 71, 188, 0.5);
    }

    /* Footer */
    footer.page-footer {
      background: linear-gradient(90deg, #5e35b1, #8e24aa);
      margin-top: 50px;
    }

    footer h5 {
      font-weight: 600;
    }

    footer a.white-text:hover {
      color: #ffeb3b !important;
      transition: 0.3s;
    }

    .footer-copyright {
      background: rgba(0, 0, 0, 0.15);
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="purple darken-4">
    <div class="nav-wrapper container">
      <a href="/" class="brand-logo">MedicalPredict</a>
      <a href="#" data-target="mobile-demo" class="sidenav-trigger"><i class="material-icons">menu</i></a>
      <ul class="right hide-on-med-and-down">
        <li><a href="/">Home</a></li>
        <li><a href="/about">About</a></li>
      </ul>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <ul class="sidenav" id="mobile-demo">
    <li><a href="/">Home</a></li>
    <li><a href="/about">About</a></li>
  </ul>

  <!-- Hero Section -->
  <div class="section center-align">
    <h1 class="header-text">Medical Cost Prediction</h1>
    <p class="sub-header">Predict the cost for your Medical Insurance in seconds!</p>
  </div>

  <!-- Form Section -->
  <div class="container">
    <div class="row">
      <div class="col s12 m10 offset-m1">
        <div class="card">
          <form action="/predict" method="post">
            <div class="row">
              <div class="input-field col s6 m4">
                <input id="age" name="age" type="number" required>
                <label for="age">Age</label>
              </div>

              <div class="input-field col s6 m4">
                <input id="gender" name="Gender" type="number" placeholder="0 - Male, 1 - Female" required>
                <label for="gender">Gender</label>
              </div>

              <div class="input-field col s6 m4">
                <input id="bmi" name="bmi" type="number" step="0.1" required>
                <label for="bmi">BMI</label>
              </div>

              <div class="input-field col s6 m4">
                <input id="children" name="children" type="number" placeholder="0 for None" required>
                <label for="children">Children</label>
              </div>

              <div class="input-field col s6 m4">
                <input id="smoker" name="smoker" type="number" placeholder="0 - No, 1 - Yes" required>
                <label for="smoker">Smoker</label>
              </div>

              <div class="input-field col s6 m4">
                <input id="region" name="region" type="number" placeholder="0-NW / 1-NE / 2-SE / 3-SW" required>
                <label for="region">Region</label>
              </div>
            </div>

            <div class="row center-align">
              <button type="submit" class="btn-large btn-custom waves-effect waves-light">
                Predict Cost
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="page-footer purple darken-4">
    <div class="container">
      <div class="row">
        <div class="col l8 s12">
          <h5 class="white-text">About</h5>
          <p class="grey-text text-lighten-4">
            Predict medical insurance costs instantly with our AI-powered tool.
          </p>
        </div>
        <div class="col l4 s12">
          <h5 class="white-text">Links</h5>
          <ul>
            <li><a class="white-text" href="/">Home</a></li>
            <li><a class="white-text" href="/about">About</a></li>
          </ul>
        </div>
      </div>
    </div>
    <div class="footer-copyright">
      <div class="container center-align">
        © 2025 MedicalPredict
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script>
    $(document).ready(function(){
      $('.sidenav').sidenav();
    });
  </script>
</body>
</html>
